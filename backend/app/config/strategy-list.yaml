strategies:
  - index: buy_and_hold
    category: Long Term
    strategy: Buy & Hold
    risk: Low
    short_description: Buy quality assets and hold for years/decades.
    timeframe: Years / decades
    indicators: Fundamentals
    entry_rules: Buy strong companies or index funds at fair value.
    exit_rules: Sell only if fundamentals deteriorate.
    parameters:
      fundamental:
        min_quality_score: 70
        sell_on_fundamental_shift: true
      technical:
        max_drawdown: 30%
        rebalance_interval_days: 365
    parameter_settings:
      min_quality_score: 70
      sell_on_fundamental_shift: true
      max_drawdown_pct: 30
      max_positions: 20
      max_position_pct: 10
      enable_stop_loss: false
      enable_take_profit: false
      halt_on_drawdown: true
      rebalance: true
      rebalance_threshold: 5
      run_frequency_minutes: 1440
      min_volume: 100000
      order_type: MARKET
      enable_fundamental_filter: true

  - index: index_fund_investing
