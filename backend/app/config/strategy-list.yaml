  - index: trend_following
    category: Swing Trading
    strategy: Trend Following
    risk: Medium
    short_description: Trade in the direction of the overall trend.
    timeframe: Days to weeks
    indicators: Moving averages, MACD
    entry_rules: Enter on pullbacks in a trend.
    exit_rules: Exit on trend break.
    parameters:
      fundamental:
        valuation_metric: none
      technical:
        fast_ma: 20
        slow_ma: 50
        stop_loss_percent: 5%
        take_profit_percent: 15%
    parameter_settings:
      sma_short: 20
      sma_long: 50
      stop_loss_pct: 5
      take_profit_pct: 15
      trailing_stop_pct: 3
      enable_stop_loss: true
      enable_take_profit: true
      max_positions: 10
      max_position_pct: 10
      cash_reserve_pct: 10
      min_volume: 500000
      run_frequency_minutes: 60
      order_type: MARKET
      entryConditions:
        - id: 1
          indicator: CLOSE
          op: ">"
          compareType: indicator
          compareIndicator: SMA
          comparePeriod: 50
          logic: AND
        - id: 2
          indicator: SMA
          period: 20
          op: ">"
          compareType: indicator
          compareIndicator: SMA
          comparePeriod: 50
          logic: AND
        - id: 3
          indicator: MACD
          op: "="
          compareType: value
          value: crossover_up
          logic: AND
      strategy:
        - type: exit
          parameters:
            indicator: Close
            operator: "<"
            value: ""
        - type: stopLoss
          parameters:
            lossType: percent
            value: "5"
        - type: takeProfit
          parameters:
            profitType: percent
            value: "15"

  - index: breakout_trading
