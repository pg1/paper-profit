      max_positions: 8
      max_position_pct: 12
      cash_reserve_pct: 10
      min_volume: 1000000
      run_frequency_minutes: 30
      order_type: MARKET
      entryConditions:
        - id: 1
          indicator: VOLUME
          op: ">"
          compareType: value
          value: "1.5"
          logic: AND
        - id: 2
          indicator: ATR
          period: 14
